name: Auto-update music manifest

on:
  push:
    paths:
      - 'music/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-manifest:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild music manifest
        run: node scripts/generate-custom-player-manifest.mjs

      - name: Commit manifest changes
        run: |
          if git diff --quiet -- custom-player-manifest.json; then
            echo "No manifest changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom-player-manifest.json
          git commit -m "chore: update music manifest"
          git push
